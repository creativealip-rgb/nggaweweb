<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="8" y1="6" x2="24" y2="26">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" stroke="#22d3ee" stroke-opacity="0.2" fill="none"/>
  <!-- N letter as path (no text element) -->
  <!-- Left vertical stroke -->
  <rect x="8" y="7" width="3" height="18" rx="1" fill="url(#glow)"/>
  <!-- Diagonal stroke -->
  <polygon points="11,7 14,7 24,25 21,25" fill="url(#glow)"/>
  <!-- Right vertical stroke -->
  <rect x="21" y="7" width="3" height="18" rx="1" fill="url(#glow)"/>
</svg>
